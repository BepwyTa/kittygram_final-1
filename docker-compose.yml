version: '3.8'

volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend/
    container_name: backend
    env_file: .env
    volumes:
      - static:/static
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    env_file: .env
    build: ./frontend/
    container_name: frontend
    command: >
      sh -c "cp -r /app/build/static/. /static/
      && cp /app/build/index.html /app/build/favicon.ico
      /app/build/manifest.json /app/build/asset-manifest.json /static/"
    volumes:
      - static:/static
    depends_on:
      - backend

  gateway:
    build: ./nginx/
    container_name: gateway
    env_file: .env
    ports:
      - 9000:80
    volumes:
      - static:/static
      - media:/app/media
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully
